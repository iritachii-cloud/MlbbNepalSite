<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Esports – Hero Cards</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="audio-control">
        <button id="musicToggle" class="music-btn circle-btn"><i class="fas fa-music"></i></button>
    </div>
    <audio id="themeSong" loop preload="auto">
        <source src="../assets/audio/theme1.mp3" type="audio/mpeg">
    </audio>

<!-- Music Player Modal -->
<div id="musicModal" class="music-modal">
    <div class="music-modal-content">
        <span class="close" id="closeModal">&times;</span>
        <div class="modal-album">
            <img id="modalAlbumImg" src="" alt="Album Art">
        </div>
        <h3 id="modalThemeName">Epic Battle</h3>

        <!-- New: Dropdown for theme selection -->
        <select id="themeSelectDropdown" class="theme-select-dropdown"></select>

        <div class="modal-controls">
            <button id="modalPrev"><i class="fas fa-step-backward"></i></button>
            <button id="modalPlayPause"><i class="fas fa-play"></i></button>
            <button id="modalNext"><i class="fas fa-step-forward"></i></button>
            <button id="modalShuffle"><i class="fas fa-random"></i></button>
            <button id="modalLoop"><i class="fas fa-repeat"></i></button>
        </div>
        <div class="modal-timeline">
            <span id="modalCurrentTime">0:00</span>
            <input type="range" id="modalSeek" min="0" max="100" value="0">
            <span id="modalDuration">0:00</span>
        </div>
        <div class="modal-volume">
            <i class="fas fa-volume-down"></i>
            <input type="range" id="modalVolume" min="0" max="100" value="50">
            <i class="fas fa-volume-up"></i>
        </div>
    </div>
</div>

    <header class="sticky-header">
        <nav class="navbar">
            <div class="logo">HERO CARD</div>
            <ul class="nav-links">
                <li class="dropdown">
                    <a href="#">Pages</a>
                    <ul class="dropdown-menu">
                        <li><a href="../index.html">Home</a></li>
                        <li><a href="../mlbb-wheel/index.html">MLBB Wheel</a></li>
                        <li><a href="index.html">Hero Cards</a></li>
                    </ul>
                </li>
                <li><a href="#" class="back-home">Back to Home</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-cards-section">
            <div class="container">
                <h2>Hero Gallery</h2>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Search by name or nickname...">
                    <i class="fas fa-search search-icon"></i>
                </div>
                <div id="cardsGrid" class="cards-grid"></div>
            </div>
        </section>
    </main>

    <!-- Hero Detail Modal -->
    <div id="heroModal" class="modal">
        <div class="modal-content hero-modal-content">
            <span class="close">&times;</span>
            <div id="modalHeroContent"></div>
            <button class="modal-nav prev" id="prevHero"><i class="fas fa-chevron-left"></i></button>
            <button class="modal-nav next" id="nextHero"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="../js/audio.js"></script>
</body>

</html>
